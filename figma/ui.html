<input type="file" id="picker" name="fileList" webkitdirectory multiple />
<button disabled id="import">import</button>
<p>preview:</p>
<ul id="listing">
  <li>no files selected</li>
</ul>

<script>
  // document.getElementById('create').onclick = () => {
  //   const textbox = document.getElementById('count');
  //   const count = parseInt(textbox.value, 10);
  //   parent.postMessage(
  //     { pluginMessage: { type: 'create-shapes', count } },
  //     '*',
  //   );
  // };

  // document.getElementById('cancel').onclick = () => {
  //   parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
  // };
  const picker = document.getElementById('picker');
  const listing = document.getElementById('listing');
  const importButton = document.getElementById('import');
  let files = [];
  picker.addEventListener('change', async (e) => {
    listing.innerHTML = '';
    // for (let file of Array.from(e.target.files)) {
    //   const item = document.createElement('li');
    //   item.textContent = file.webkitRelativePath;
    //   item.textContent = file.name;
    //   listing.appendChild(item);
    // }

    // const displayImage = async (file) => {
    //   console.log(await file.text());
    // };
    // displayImage(Array.from(e.target.files)[0]);

    const parseFiles = async (targetFiles) => {
      const parsedFiles = [];
      for (let index = 0; index <= targetFiles.length; index += 1) {
        const file = targetFiles[index];
        if (file) {
          const fileName = file.name;
          const item = document.createElement('li');

          if (fileName.includes('.svg')) {
            const content = await file.text();
            const name = fileName.replaceAll('.svg', ''); // possibly parse folder structure to determine full naming convention
            parsedFiles.push({ content, name });
            item.textContent = `${name} (${file.webkitRelativePath})`;
          }
          listing.appendChild(item);
        }
      }
      return parsedFiles;
    };

    files = await parseFiles(Array.from(e.target.files));
    if (files.length > 0) {
      importButton.disabled = false;
    } else {
      importButton.disabled = true;
    }
  });
  document.getElementById('import').onclick = () => {
    parent.postMessage(
      {
        pluginMessage: {
          type: 'import',
          svgs: files,
        },
      },
      '*',
    );
  };
</script>
